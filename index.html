<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    overflow: hidden;
    margin: 0;
}

/* Center container */
.container {
    margin-top: 8vh;
    padding: 10px;
}

/* Sticker */
.sticker {
    width: 80%;
    max-width: 260px;
    border-radius: 20px;
}

/* Question */
h1 {
    margin: 20px 0;
    color: #333;
    font-size: 6vw;
}

/* Buttons */
button {
  background-color: #f383ea;
  border: none;
  color: white;
  padding: 14px 28px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 20px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  position: absolute;
  transition: 0.25s;
}

/* Initial positions */
#yesBtn {
    background: #80f1ab;
    top: 70%;
    left: 20%;
    background: #80f1ab;
    transition: transform 0.25s ease;
}

#noBtn {
    background: #80f1ab;
    top: 70%;
    left: 58%;
    
}
</style>
</head>

<body>

<div class="container">
    <img src="cartoon1.gif" class="sticker" alt="Cute sticker">
    <h1>Do you like me?</h1>
</div>

<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

// YES → open page
yesBtn.onclick = function () {
    window.location.href = "yes.html";
};

// YES moves sometimes (not always)
yesBtn.addEventListener("mouseover", moveYes);
yesBtn.addEventListener("touchstart", moveYes);

// NO moves always
noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveYes(e) {

    // 70% chance to move
    if (Math.random() < 0.3) {

        const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight);

        yesBtn.style.left = x + "px";
        yesBtn.style.top = y + "px";
    }
    // 30% → stay still so user can click
}

function moveNo() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

</script>

</body>
</html>
